services:
  # 1. The Local AI Engine (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # 2. The Vector Database (ChromaDB for external AI knowledge)
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma

  chat_website:
    build:
      context: ./chat_website
    container_name: chat_website
    ports:
      - "3000:3000"
    depends_on:
      - ollama
      - chromadb
    volumes:
      - ./chat_website:/app
      - /app/node_modules
      - ./data/db:/app/db
    environment:
      - ONLINE_API_URL=${ONLINE_API_URL:-}
      - ONLINE_API_KEY=${ONLINE_API_KEY:-}

volumes:
  ollama-data:
    driver: local
  chromadb-data:
    driver: local